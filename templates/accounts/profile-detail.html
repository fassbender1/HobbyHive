{% extends 'shared/base.html' %}
{% block title %}Profile{% endblock %}
{% block content %}
<h1>{{ object.username }}'s Profile</h1>
<p>Email: {{ object.email }}</p>
<p>Joined: {{ object.date_joined }}</p>
<a href="{% url 'accounts:profile-edit' object.pk %}" class="btn btn-success">Edit Profile</a>
<a href="{% url 'accounts:profile-delete' object.pk %}" class="btn btn-danger">Delete Profile</a>
<a href="{% url 'accounts:user-list' %}" class="btn btn-secondary">Back to Users</a>
{% endblock %}
