{% extends 'shared/base.html' %}
{% block title %}Users{% endblock %}
{% block content %}
<h1>Registered Users</h1>
<ul class="list-group">
    {% for user in object_list %}
    <li class="list-group-item">
        {{ user.username }} - {{ user.email }}
        <a href="{% url 'accounts:profile-detail' user.pk %}" class="btn btn-primary btn-sm">View Profile</a>
    </li>
    {% empty %}
        <p>No users found.</p>
    {% endfor %}
</ul>
{% endblock %}
