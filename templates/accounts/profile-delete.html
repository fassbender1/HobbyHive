{% extends 'shared/base.html' %}
{% block title %}Delete Profile{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Delete Profile</h2>
    <p>Are you sure you want to delete your profile, <strong>{{ object.username }}</strong>? This action cannot be undone.</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'accounts:profile-detail' object.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
