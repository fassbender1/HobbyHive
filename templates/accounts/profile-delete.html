{% extends 'shared/base.html' %}
{% block title %}Delete Profile{% endblock %}
{% block content %}
<h1>Delete Profile</h1>
<p>Are you sure you want to delete your account, {{ object.username }}?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'accounts:profile-detail' object.pk %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
