<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HobbyHive{% endblock %}</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9f9; color: #333; }
        .navbar { background-color: #a2d5f2; }
        .footer { background-color: #e2f0d9; padding: 15px; text-align: center; }
        .btn-custom { background-color: #a2d5f2; color: #fff; }
        .btn-custom:hover { background-color: #7fc8ea; color: #fff; }
        .card { margin-bottom: 15px; }
        .navbar {box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .navbar-brand {font-size: 1.4rem; }
        .nav-link:hover {transform: translateY(-2px);text-shadow: 0 2px 6px rgba(255,255,255,0.4); }
        .navbar .nav-link {color: #ffffffcc;font-weight: 500;transition: all 0.25s ease; }
        .navbar .nav-link:hover {color: #ffffff; }
        .navbar form {display: flex;align-items: center; }
        .navbar button.nav-link {line-height: 1.5; }
        .navbar .fw-semibold {color: #ffffff;text-shadow: 0 1px 4px rgba(0,0,0,0.2); }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% if messages %}
        <div class="position-fixed top-0 end-0 p-3" style="z-index: 1055;">
            {% for message in messages %}
            <div class="toast align-items-center text-white {% if message.tags %}bg-{{ message.tags }}{% else %}bg-primary{% endif %} border-0 mb-2" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="5000">
                <div class="d-flex">
                    <div class="toast-body">
                        {{ message }}
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
            </div>
            {% endfor %}
        </div>
    {% endif %}
    {% include 'shared/nav.html' %}

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    {% include 'shared/footer.html' %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var toastElList = [].slice.call(document.querySelectorAll('.toast'))
        var toastList = toastElList.map(function(toastEl) {
            return new bootstrap.Toast(toastEl)
        })
        toastList.forEach(toast => toast.show())
    });
    </script>
</body>
</html>
