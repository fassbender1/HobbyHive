<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HobbyHive{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9f9; color: #333; }
        .navbar { background-color: #a2d5f2; }
        .footer { background-color: #e2f0d9; padding: 15px; text-align: center; }
        .btn-custom { background-color: #a2d5f2; color: #fff; }
        .btn-custom:hover { background-color: #7fc8ea; color: #fff; }
        .card { margin-bottom: 15px; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% include 'shared/nav.html' %}

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    {% include 'shared/footer.html' %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
