{% extends 'shared/base.html' %}
{% block title %}Home - HobbyHive{% endblock %}
{% block content %}
<div class="text-center mt-5">
    <h1>Welcome to HobbyHive!</h1>
    <p>Discover hobbies, join groups, and participate in events!</p>
    {% if user.is_authenticated %}
        <a href="{% url 'events:event-list' %}" class="btn btn-custom">View Events</a>
    {% else %}
        <a href="{% url 'accounts:register' %}" class="btn btn-custom">Get Started</a>
    {% endif %}
</div>
{% endblock %}
