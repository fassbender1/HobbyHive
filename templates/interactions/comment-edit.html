{% extends 'shared/base.html' %}
{% block title %}{% if object %}Edit Comment{% else %}New Comment{% endif %}{% endblock %}
{% block content %}
<h1>{% if object %}Edit Comment{% else %}Create Comment{% endif %}</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-custom">Save</button>
    <a href="{% url 'interactions:comment-list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
