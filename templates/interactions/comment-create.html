{% extends 'shared/base.html' %}
{% block title %}Add Comment{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>Add Comment</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Post Comment</button>
        <a href="{% url 'interactions:comment-list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
