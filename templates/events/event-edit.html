{% extends 'shared/base.html' %}
{% block title %}{% if object %}Edit Event{% else %}Create Event{% endif %}{% endblock %}
{% block content %}
<h1>{% if object %}Edit Event{% else %}Create Event{% endif %}</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-custom">Save</button>
    <a href="{% url 'events:event-list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
