{% extends 'shared/base.html' %}
{% block title %}Create Hobby{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>Create Hobby</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Create</button>
        <a href="{% url 'hobbies:hobby-list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
